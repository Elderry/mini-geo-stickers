<?xml-stylesheet href="./standard-cube-colors.css" type="text/css"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 31 31" width="400" height="400">

  <metadata>
    <title>Mirror Cube Sticker</title>
    <output>true</output>
    <extra-format>PNG</extra-format>
  </metadata>

  <defs>
    <linearGradient id="mirror-gradient" x1="1" y1="1" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c50c1"/>
      <stop offset="100%" stop-color="#3450bd"/>
    </linearGradient>
  </defs>

  <rect width="31" height="31" rx="2.5" ry="2.5" fill="url(../common/common-defs.svg#backgroundSilverGradient)"/>
  <rect x="1" y="1" width="6" height="8" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>
  <rect x="8" y="1" width="9" height="8" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>
  <rect x="18" y="1" width="12" height="8" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>
  <rect x="1" y="10" width="6" height="9" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>
  <rect x="8" y="10" width="9" height="9" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>
  <image x="9" y="11" width="7" height="7" href="../logo/GAN.svg" style="--gan-blue: var(--white);" />
  <rect x="18" y="10" width="12" height="9" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>
  <rect x="1" y="20" width="6" height="10" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>
  <rect x="8" y="20" width="9" height="10" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>
  <rect x="18" y="20" width="12" height="10" rx="1.2" ry="1.2" fill="url(#mirror-gradient)"/>

</svg>
