<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="320" height="320">
  <defs>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f8fa" />
      <stop offset="45%" stop-color="#d5d9de" />
      <stop offset="100%" stop-color="#9ba3ab" />
    </linearGradient>
  </defs>
  <style>
    svg {
      /* Standard 12-color Megaminx scheme */
      --white:      #FFFFFF;
      --yellow:     #FFD500;
      --red:        #C41E3A;
      --blue:       #0051BA;
      --green:      #009E60;
      --purple:     #8B2D8B;
      --gray:       #6E6E6E;
      --beige:      #E8C39E;
      --orange:     #FF5800;
      --pink:       #FF6FA1;
      --light-blue: #6FB7E8;
      --lime:       #B0E830;
      --gan-blue:   #0075cf;
    }
    .white      { fill: var(--white); }
    .yellow     { fill: var(--yellow); }
    .red        { fill: var(--red); }
    .blue       { fill: var(--blue); }
    .green      { fill: var(--green); }
    .purple     { fill: var(--purple); }
    .gray       { fill: var(--gray); }
    .frame      { fill: url(#silverGradient); }
    .beige      { fill: var(--beige); }
    .orange     { fill: var(--orange); }
    .pink       { fill: var(--pink); }
    .light-blue { fill: var(--light-blue); }
    .lime       { fill: var(--lime); }
  </style>

      <!-- One side of a Megaminx (flat platform view).
        Outer pentagon (R=13.5) + inner pentagon (r=6), both top-vertex up.
       The ring is cut by extensions of the inner pentagon's edges,
       producing 10 quadrilaterals: 5 corner quads + 5 thin edge quads. -->

        <!-- Background pentagon (vertex radius +0.7 from outer R=13.5 -> R=14.2) -->
        <path d="M 15.7053,1.3125 L 27.7997,10.0995 A 1.2,1.2 0 0 1 28.2356,11.4412 L 23.616,25.6588 A 1.2,1.2 0 0 1 22.4747,26.488 L 7.5253,26.488 A 1.2,1.2 0 0 1 6.384,25.6588 L 1.7644,11.4412 A 1.2,1.2 0 0 1 2.2003,10.0995 L 14.2947,1.3125 A 1.2,1.2 0 0 1 15.7053,1.3125 Z" class="frame"/>

  <!-- 5 corner quads (apex = inner vertex iv_k, base through outer vertex v_k) -->
  <path d="M 14.5298,8.1639 L 11.4099,5.8972 A 0.8,0.8 0 0 1 11.4099,4.6028 L 14.5298,2.3361 A 0.8,0.8 0 0 1 15.4702,2.3361 L 18.5901,4.6028 A 0.8,0.8 0 0 1 18.5901,5.8972 L 15.4702,8.1639 A 0.8,0.8 0 0 1 14.5298,8.1639 Z" class="red"/>
  <path d="M 21.3561,12.4403 L 22.5478,8.7727 A 0.8,0.8 0 0 1 23.7789,8.3727 L 26.8988,10.6394 A 0.8,0.8 0 0 1 27.1895,11.5339 L 25.9978,15.2015 A 0.8,0.8 0 0 1 24.7667,15.6015 L 21.6468,13.3348 A 0.8,0.8 0 0 1 21.3561,12.4403 Z" class="blue"/>
  <path d="M 19.3985,20.2541 L 23.2549,20.2541 A 0.8,0.8 0 0 1 24.0158,21.3013 L 22.8241,24.9689 A 0.8,0.8 0 0 1 22.0633,25.5217 L 18.2069,25.5217 A 0.8,0.8 0 0 1 17.446,24.4745 L 18.6377,20.8069 A 0.8,0.8 0 0 1 19.3985,20.2541 Z" class="yellow"/>
  <path d="M 11.3623,20.8069 L 12.554,24.4745 A 0.8,0.8 0 0 1 11.7931,25.5217 L 7.9367,25.5217 A 0.8,0.8 0 0 1 7.1759,24.9689 L 5.9842,21.3013 A 0.8,0.8 0 0 1 6.7451,20.2541 L 10.6015,20.2541 A 0.8,0.8 0 0 1 11.3623,20.8069 Z" class="purple"/>
  <path d="M 8.3532,13.3348 L 5.2333,15.6015 A 0.8,0.8 0 0 1 4.0022,15.2015 L 2.8105,11.5339 A 0.8,0.8 0 0 1 3.1012,10.6394 L 6.2211,8.3727 A 0.8,0.8 0 0 1 7.4522,8.7727 L 8.6439,12.4403 A 0.8,0.8 0 0 1 8.3532,13.3348 Z" class="green"/>

  <!-- 5 thin edge quads (along each inner pentagon edge) -->
  <path d="M 16.5713,9.6472 L 19.6052,11.8515 A 0.8,0.8 0 0 0 20.8363,11.4515 L 22.028,7.7839 A 0.8,0.8 0 0 0 21.7373,6.8894 L 20.6316,6.0861 A 0.8,0.8 0 0 0 19.6912,6.0861 L 16.5713,8.3528 A 0.8,0.8 0 0 0 16.5713,9.6472 Z" class="orange"/>
  <path d="M 20.5763,14.8403 L 19.4175,18.4069 A 0.8,0.8 0 0 0 20.1784,19.4541 L 24.0348,19.4541 A 0.8,0.8 0 0 0 24.7956,18.9013 L 25.218,17.6015 A 0.8,0.8 0 0 0 24.9273,16.707 L 21.8074,14.4403 A 0.8,0.8 0 0 0 20.5763,14.8403 Z" class="lime"/>
  <path d="M 16.875,20.2541 L 13.125,20.2541 A 0.8,0.8 0 0 0 12.3641,21.3013 L 13.5558,24.9689 A 0.8,0.8 0 0 0 14.3166,25.5217 L 15.6834,25.5217 A 0.8,0.8 0 0 0 16.4442,24.9689 L 17.6359,21.3013 A 0.8,0.8 0 0 0 16.875,20.2541 Z" class="pink"/>
  <path d="M 10.5825,18.4069 L 9.4237,14.8403 A 0.8,0.8 0 0 0 8.1926,14.4403 L 5.0727,16.707 A 0.8,0.8 0 0 0 4.782,17.6015 L 5.2044,18.9013 A 0.8,0.8 0 0 0 5.9652,19.4541 L 9.8216,19.4541 A 0.8,0.8 0 0 0 10.5825,18.4069 Z" class="light-blue"/>
  <path d="M 10.3948,11.8515 L 13.4287,9.6472 A 0.8,0.8 0 0 0 13.4287,8.3528 L 10.3088,6.0861 A 0.8,0.8 0 0 0 9.3684,6.0861 L 8.2627,6.8894 A 0.8,0.8 0 0 0 7.972,7.7839 L 9.1637,11.4515 A 0.8,0.8 0 0 0 10.3948,11.8515 Z" class="beige"/>

  <!-- Inner (small) center pentagon -->
  <path d="M 15.4702,9.8361 L 19.7658,12.957 A 0.8,0.8 0 0 1 20.0565,13.8515 L 18.4157,18.9013 A 0.8,0.8 0 0 1 17.6548,19.4541 L 12.3452,19.4541 A 0.8,0.8 0 0 1 11.5843,18.9013 L 9.9435,13.8515 A 0.8,0.8 0 0 1 10.2342,12.957 L 14.5298,9.8361 A 0.8,0.8 0 0 1 15.4702,9.8361 Z" class="white"/>

  <!-- GAN logo centered in the white center pentagon -->
  <svg x="13.05" y="12.775" width="3.9" height="4.45" viewBox="0 0 900 1024" preserveAspectRatio="xMidYMid meet">
    <path fill="var(--gan-blue)" d="M 450 0 L 870 244 L 760 309 L 450 130 L 254 244 L 450 357 L 506 325 L 366 244 L 450 195 L 702 341 L 450 487 L 30 244 Z"/>
    <path fill="var(--gan-blue)" d="M 0 292 L 422 537 L 422 1024 L 310 960 L 310 830 L 112 715 L 112 845 L 0 780 Z M 112 488 L 112 585 L 310 700 L 310 602 Z"/>
    <path fill="var(--gan-blue)" d="M 900 292 L 900 780 L 844 812 L 590 666 L 590 960 L 478 1024 L 478 537 L 562 488 L 787 617 L 787 358 Z"/>
  </svg>
</svg>
