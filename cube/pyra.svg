<?xml-stylesheet href="./standard-cube-colors.css" type="text/css"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 32" width="500" height="500">

  <metadata>
    <title>Pyraminx Sticker</title>
    <output>true</output>
    <extra-format>PNG</extra-format>
  </metadata>

  <!-- Three-layer recursive probe: side length 9 equilateral triangles.
       Built by extending the successful two-layer construction:
       each adjacent up/down facing edge pair is offset by 1, then an outer frame triangle is added at offset 1. -->

  <!-- Outer frame triangle, rounded radius 1.6 -->
  <path d="M 19.39,3.4 L 33.58,27.98 A 1.6,1.6 0 0 1 32.19,30.38 L 3.81,30.38 A 1.6,1.6 0 0 1 2.42,27.98 L 16.61,3.4 A 1.6,1.6 0 0 1 19.39,3.4 Z" fill="url(../common/common-defs.svg#backgroundSilverGradient)" />

  <!-- up-pointing small triangles -->
  <!-- U1 -->
  <path d="M 18.69,4.2 L 21.81,9.59 A 0.8,0.8 0 0 1 21.11,10.79 L 14.89,10.79 A 0.8,0.8 0 0 1 14.19,9.59 L 17.31,4.2 A 0.8,0.8 0 0 1 18.69,4.2 Z" fill="var(--green)" />
  <!-- U2 -->
  <path d="M 13.33,13.49 L 16.44,18.89 A 0.8,0.8 0 0 1 15.75,20.09 L 9.52,20.09 A 0.8,0.8 0 0 1 8.83,18.89 L 11.94,13.49 A 0.8,0.8 0 0 1 13.33,13.49 Z" fill="var(--green)" />
  <!-- U3 -->
  <path d="M 24.06,13.49 L 27.17,18.89 A 0.8,0.8 0 0 1 26.48,20.09 L 20.25,20.09 A 0.8,0.8 0 0 1 19.56,18.89 L 22.67,13.49 A 0.8,0.8 0 0 1 24.06,13.49 Z" fill="var(--green)" />
  <!-- U4 -->
  <path d="M 7.96,22.79 L 11.08,28.18 A 0.8,0.8 0 0 1 10.38,29.38 L 4.15,29.38 A 0.8,0.8 0 0 1 3.46,28.18 L 6.58,22.79 A 0.8,0.8 0 0 1 7.96,22.79 Z" fill="var(--red)" />
  <!-- U5 -->
  <path d="M 18.69,22.79 L 21.81,28.18 A 0.8,0.8 0 0 1 21.11,29.38 L 14.89,29.38 A 0.8,0.8 0 0 1 14.19,28.18 L 17.31,22.79 A 0.8,0.8 0 0 1 18.69,22.79 Z" fill="var(--red)" />
  <!-- U6 -->
  <path d="M 29.42,22.79 L 32.54,28.18 A 0.8,0.8 0 0 1 31.85,29.38 L 25.62,29.38 A 0.8,0.8 0 0 1 24.92,28.18 L 28.04,22.79 A 0.8,0.8 0 0 1 29.42,22.79 Z" fill="var(--red)" />

  <!-- down-pointing small triangles -->
  <!-- D1 -->
  <path d="M 14.89,11.79 L 21.11,11.79 A 0.8,0.8 0 0 1 21.81,12.99 L 18.69,18.39 A 0.8,0.8 0 0 1 17.31,18.39 L 14.19,12.99 A 0.8,0.8 0 0 1 14.89,11.79 Z" fill="var(--blue)" />
  <image x="16.55" y="13" width="2.9" height="3.3" href="../logo/GAN.svg" style="--gan-blue: var(--white);" />
  <!-- D2 -->
  <path d="M 9.52,21.09 L 15.75,21.09 A 0.8,0.8 0 0 1 16.44,22.29 L 13.33,27.68 A 0.8,0.8 0 0 1 11.94,27.68 L 8.83,22.29 A 0.8,0.8 0 0 1 9.52,21.09 Z" fill="var(--yellow)" />
  <!-- D3 -->
